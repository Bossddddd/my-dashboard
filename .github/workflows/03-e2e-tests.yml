name: 3. E2E Tests

on:
  workflow_run:
    workflows: ["2. Database Migration"]
    types:
      - completed

jobs:
  e2e-tests:
    name: 🤖 Build & E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 📥 Pull repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: ⚙️ Install Node.js v20 & configure npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Strict installation from package-lock.json
        run: npm ci

      - name: 🏗️ Compile Next.js pages and optimize assets
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npm run build

      - name: 🌐 Download Chromium, Firefox, WebKit binaries
        run: npx playwright install --with-deps

      - name: 🤖 Launch headless browsers and execute UI test scripts
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx playwright test

      - name: 📁 Save HTML reports and failure traces for 30 days
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
