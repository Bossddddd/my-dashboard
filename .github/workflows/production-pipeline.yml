name: 👑 Production Pipeline (main)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality_and_build:
    name: 01 - Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🧹 Run ESLint
        run: npx eslint .
      - name: 🏷️ Run Type Check
        run: npx tsc --noEmit
      - name: 🧪 Run Unit Tests
        run: npm run test:coverage
      - name: 📦 Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - name: 🏗️ Test Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1

  database_migration:
    name: 02 - Database Migration
    needs: quality_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🗄️ Database Push (Drizzle to Prod)
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  smoke_tests:
    name: 03 - Smoke Tests (All Browsers)
    needs: database_migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🗄️ Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: 🎭 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium firefox webkit
      - name: 🔧 Install Playwright System Dependencies
        run: npx playwright install-deps
      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next
      - name: 🕵️ Run Smoke Test & Sentry Check (3 browsers parallel)
        run: npx playwright test tests/smoke.spec.ts tests/07-sentry-integration.spec.ts --config=playwright.config.cjs
        env:
          CI: "true"
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  vercel_deployment:
    name: 04 - Vercel Prod Deploy
    needs: smoke_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest
      - name: 🔗 Pull Vercel Environment Information (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: 📦 Build Project for Vercel (Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: 🌐 Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
