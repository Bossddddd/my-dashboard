name: 👑 Production Pipeline (main)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality_and_build:
    name: 01 - Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🧹 Run ESLint
        run: npx eslint .
      - name: 🏷️ Run Type Check
        run: npx tsc --noEmit
      - name: 🧪 Run Unit Tests
        run: npm run test:coverage
      - name: 🏗️ Test Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: 📝 Quality & Build Summary
        if: always()
        run: |
          echo "### 🧪 Quality & Build Checks" >> $GITHUB_STEP_SUMMARY
          echo "- **ESLint:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Type Check:** ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests:** ✅ Completed" >> $GITHUB_STEP_SUMMARY

  database_migration:
    name: 02 - Database Migration
    needs: quality_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🗄️ Database Push (Drizzle to Prod)
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  smoke_tests:
    name: 03 - Smoke Tests (${{ matrix.browser }})
    needs: database_migration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      - name: 🏗️ Build Next.js App
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: 🕵️ Run Playwright Smoke Test & Sentry Check (Read-Only)
        run: npx playwright test tests/smoke.spec.ts tests/07-sentry-integration.spec.ts --project=${{ matrix.browser }}
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-production-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
      - name: 📝 Playwright Summary
        if: always()
        run: |
          echo "### 🎭 Playwright Tests (${{ matrix.browser }})" >> $GITHUB_STEP_SUMMARY
          echo "Tests have finished running. If there are failures, please check the uploaded artifact report below." >> $GITHUB_STEP_SUMMARY

  vercel_deployment:
    name: 04 - Vercel Prod Deploy
    needs: smoke_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest
      - name: 🔗 Pull Vercel Environment Information (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: 📦 Build Project for Vercel (Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: 🌐 Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: 📝 Deployment Summary
        run: |
          echo "### 🚀 Vercel Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Live URL:** [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})" >> $GITHUB_STEP_SUMMARY
