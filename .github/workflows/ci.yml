name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  quality-checks:
    name: 1. 🛡️ Quality Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Pull code from GitHub
        uses: actions/checkout@v4

      - name: ⚙️ Install Node.js v20 & configure npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Download packages (package-lock.json)
        run: npm ci

      - name: 🧹 Check code syntax & style rules (ESLint)
        run: npx eslint .

      - name: 🏷️ Strict TypeScript type validation (tsc)
        run: npx tsc --noEmit

      - name: 🧪 Execute Vitest components testing
        run: npm run test:coverage

  db-migration:
    name: 2. 🗄️ Database Migration
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Pull repository code
        uses: actions/checkout@v4

      - name: ⚙️ Install Node.js v20 & configure npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Strict installation from package-lock.json
        run: npm ci

      - name: 🗄️ Compare schema & apply changes to Neon Database
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx drizzle-kit push

  e2e-tests:
    name: 3. 🤖 Build & E2E Tests
    needs: db-migration
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Pull repository code
        uses: actions/checkout@v4

      - name: ⚙️ Install Node.js v20 & configure npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Strict installation from package-lock.json
        run: npm ci

      - name: 🏗️ Compile Next.js pages and optimize assets
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npm run build

      - name: 🌐 Download Chromium, Firefox, WebKit binaries
        run: npx playwright install --with-deps

      - name: 🤖 Launch headless browsers and execute UI test scripts
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx playwright test

      - name: 📁 Save HTML reports and failure traces for 30 days
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
