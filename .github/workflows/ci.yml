name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npx eslint .
        
      - name: Type Check
        run: npx tsc --noEmit

  e2e-tests:
    name: Database Migration & E2E Tests
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Database Migration
        env:
          # Use a dedicated Test DB for Playwright. 
          # You must add TEST_DATABASE_URL in GitHub Secrets!
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx drizzle-kit push
        
      - name: Build Next.js App
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npm run build
        
      - name: Run Playwright tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: npx playwright test
        
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
