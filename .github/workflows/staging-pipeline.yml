name: 🚀 Staging Pipeline (dev)

on:
  push:
    branches: ["dev", "Dev"]
  pull_request:
    branches: ["dev", "Dev"]

jobs:
  staging-pipeline:
    name: 🔄 Staging CI/CD Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Pull code from GitHub
        uses: actions/checkout@v4

      - name: ⚙️ Install Node v20 & npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Download packages (npm ci)
        run: npm ci

      # --- PHASE 01: Quality Checks & Build ---
      - name: 🧹 Check code syntax (ESLint)
        run: npx eslint .

      - name: 🏷️ Strict TypeScript type validation (tsc)
        run: npx tsc --noEmit

      - name: 🧪 Execute Vitest unit testing
        run: npm run test:coverage

      - name: 🏗️ Build Next.js App
        run: npm run build
        env:
          # If Sentry or other tools require build-time secrets, they go here
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      # --- PHASE 02: Database Migration ---
      - name: 🗄️ Database Push (Drizzle)
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      # --- PHASE 03: Playwright E2E Tests ---
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🤖 Run Playwright E2E Tests
        run: npx playwright test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

      # --- PHASE 04: Vercel Preview Deployment ---
      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 📦 Build Project for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🌐 Deploy to Vercel Preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
