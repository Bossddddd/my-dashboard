name: 🚀 Staging Pipeline (dev)

on:
  push:
    branches: ["dev", "Dev"]
  pull_request:
    branches: ["dev", "Dev"]

jobs:
  quality_and_build:
    name: 01 - Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🧹 Run ESLint
        run: npx eslint .
      - name: 🏷️ Run Type Check
        run: npx tsc --noEmit
      - name: 🧪 Run Unit Tests
        run: npm run test:coverage
      - name: 🏗️ Test Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  database_migration:
    name: 02 - Database Migration
    needs: quality_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🗄️ Database Push (Drizzle)
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  e2e_tests:
    name: 03 - Playwright E2E Tests
    needs: database_migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: 🏗️ Build Next.js App
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      - name: 🤖 Run Playwright E2E Tests
        run: npx playwright test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

  vercel_deployment:
    name: 04 - Vercel Preview Deploy
    needs: e2e_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest
      - name: 🔗 Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: 📦 Build Project for Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: 🌐 Deploy to Vercel Preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
